<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#050507"/>
  <rect width="1200" height="4" fill="#4f8ff7"/>
  <!-- Title -->
  <text x="80" y="200" fill="#f0f0f5" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="56">Wo landet dein</text>
  <text x="80" y="270" fill="#4f8ff7" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="56">Steuergeld?</text>
  <!-- Subtitle -->
  <text x="80" y="340" fill="#9898ab" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="24">Der Bundeshaushalt - persoenlich, transparent, handlungsfaehig.</text>
  <!-- Stats -->
  <rect x="80" y="400" width="200" height="80" rx="12" fill="#0a0a0f" stroke="#1e1e2a" stroke-width="1"/>
  <text x="180" y="435" fill="#9898ab" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">Bundeshaushalt 2025</text>
  <text x="180" y="465" fill="#f0f0f5" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="22" text-anchor="middle">489 Mrd</text>

  <rect x="300" y="400" width="200" height="80" rx="12" fill="#0a0a0f" stroke="#1e1e2a" stroke-width="1"/>
  <text x="400" y="435" fill="#9898ab" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">Themen analysiert</text>
  <text x="400" y="465" fill="#f0f0f5" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="22" text-anchor="middle">15</text>

  <rect x="520" y="400" width="200" height="80" rx="12" fill="#0a0a0f" stroke="#1e1e2a" stroke-width="1"/>
  <text x="620" y="435" fill="#9898ab" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">MdBs bewertet</text>
  <text x="620" y="465" fill="#f0f0f5" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="22" text-anchor="middle">28+</text>

  <!-- Brand -->
  <text x="80" y="580" fill="#55556a" font-family="Inter, system-ui, sans-serif" font-size="16">publicmoneymirror.de</text>
  <text x="1120" y="580" fill="#55556a" font-family="Inter, system-ui, sans-serif" font-size="14" text-anchor="end">Open Source | MIT</text>
</svg>
