version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: pmm
      POSTGRES_PASSWORD: pmm_secret
      POSTGRES_DB: pmm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pmm"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://pmm:pmm_secret@postgres:5432/pmm
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: "http://localhost:5173,http://localhost:3000"
    volumes:
      - ./etl:/app/etl
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
