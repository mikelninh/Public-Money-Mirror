        :root {

            --color-text-muted: #64748b;
            --color-accent-blue: #3b82f6;
            --color-accent-green: #10b981;
            --color-accent-purple: #8b5cf6;
            --color-accent-orange: #f97316;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.5);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--color-bg);
            color: var(--color-text-main);
            overflow-x: hidden;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            border-radius: 24px;
        }

        .text-gradient {
            background: linear-gradient(135deg, var(--color-accent-blue), var(--color-accent-purple));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
    </style>
</head>

                Stethoscope: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M11 2v7a5 5 0 0 1-10 0V2" /><path d="M21 2v7a5 5 0 0 0-10 0V2" /><line x1="11" x2="11" y1="14" y2="2" /><line x1="21" x2="21" y1="14" y2="2" /><path d="M16 14v2a4 4 0 0 1-4 4v0a4 4 0 0 1-4-4v-2" /></svg>,
                CheckCircle: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" /><polyline points="22 4 12 14.01 9 11.01" /></svg>
            };
            return icons[name] || icons.Circle;
        };

        const budgetData = [
            { id: 'health', name: 'Healthcare', percentage: 28, amount: '€142B', description: 'Funding hospitals, medical research, and public health initiatives.', examples: ['New Cancer Research Center', 'National Vaccine Program', 'Hospital Modernization'], color: 'var(--color-accent-blue)', icon: 'Heart' },
            { id: 'education', name: 'Education', percentage: 18, amount: '€91B', description: 'Investing in schools, universities, and future generations.', examples: ['Digital Classrooms', 'University Grants', 'Teacher Training'], color: 'var(--color-accent-purple)', icon: 'BookOpen' },
            { id: 'infrastructure', name: 'Infrastructure', percentage: 15, amount: '€76B', description: 'Building roads, bridges, and sustainable transport networks.', examples: ['High-Speed Rail Link', 'Green Energy Grid', 'Urban Metro Expansion'], color: 'var(--color-accent-orange)', icon: 'Train' },
            { id: 'social', name: 'Social Services', percentage: 22, amount: '€112B', description: 'Supporting pensions, unemployment benefits, and social care.', examples: ['Elderly Care Support', 'Child Benefits', 'Housing Assistance'], color: 'var(--color-accent-green)', icon: 'Users' },
            { id: 'defense', name: 'Defense', percentage: 10, amount: '€51B', description: 'Ensuring national security and disaster response capabilities.', examples: ['Cybersecurity Unit', 'Naval Fleet Upgrade', 'Peacekeeping Missions'], color: '#ef4444', icon: 'Shield' },
            { id: 'admin', name: 'Administration', percentage: 7, amount: '€35B', description: 'Running government institutions and public services.', examples: ['Digital Governance Portal', 'Civil Service', 'Embassy Operations'], color: '#64748b', icon: 'Building' }
        ];

        const scandals = [
            { id: 1, title: "Unfinished Airport Terminal", amount: "€120M", status: "Under Investigation", description: "Construction halted due to contractor dispute. Funds currently frozen.", date: "2023-11" },
            { id: 2, title: "Digital Health Portal Outage", amount: "€4.5M", status: "Resolved", description: "Server infrastructure failure. Refund issued by vendor.", date: "2024-02" },
            { id: 3, title: "Bridge Maintenance Overspend", amount: "€12M", status: "Audited", description: "Costs exceeded budget by 40%. Audit confirmed material price surge.", date: "2023-08" }
        ];

        const localProjects = [
            { id: 1, title: "Gymnasium Mitte Renovation", type: "Education", amount: "€2.4M", lat: 52.5200, lng: 13.4050 },
            { id: 2, title: "Radbahn Kreuzberg", type: "Infrastructure", amount: "€450k", lat: 52.4980, lng: 13.4100 },
            { id: 3, title: "Tiergarten Replanting", type: "Environment", amount: "€120k", lat: 52.5140, lng: 13.3500 },
            { id: 4, title: "Charité New Wing", type: "Health", amount: "€12M", lat: 52.5250, lng: 13.3700 },
        ];

        const proposals = [
            { id: 1, title: "Audit Bundestag Renovation Costs", votes: 1240, status: "Active" },
            { id: 2, title: "Review A100 Autobahn Expansion", votes: 892, status: "Active" },

        ];

        const CategoryCard = ({ category, index, userTax }) => {
            const personalAmount = userTax ? (userTax * (category.percentage / 100)) : null;

            return (
                <motion.div
                    initial={{ opacity: 0, y: 50 }}
                    whileInView={{ opacity: 1, y: 0 }}
                    viewport={{ once: true }}
                    transition={{ delay: index * 0.1, duration: 0.6 }}
                    whileHover={{ y: -10, scale: 1.02 }}
                    className="glass-panel p-6 cursor-pointer group relative overflow-hidden"
                    style={{ borderTop: `4px solid ${category.color}` }}

                        style={{ background: category.color }} />

                    <div className="flex items-start justify-between mb-4">
                        <div className="p-3 rounded-xl bg-white/50 backdrop-blur-sm text-white"
                            style={{ backgroundColor: category.color }}>
                            <Icon name={category.icon} size={24} />
                        </div>
                        <span className="text-2xl font-bold" style={{ color: category.color }}>
                            {category.percentage}%

                    </div>

                    <h3 className="text-xl font-bold mb-2">{category.name}</h3>
                    <p className="text-[var(--color-text-muted)] text-sm mb-4 min-h-[40px]">
                        {category.description}
                    </p>

                    <div className="flex items-center justify-between mt-auto">
                        <div className="flex flex-col">
                            <span className="font-mono font-medium text-lg">
                                {personalAmount ? `€${personalAmount.toFixed(2)}` : category.amount}
                            </span>
                            {personalAmount && (
                                <span className="text-xs text-[var(--color-text-muted)]">your contribution</span>
                            )}
                        </div>
                    </div>
                </motion.div>
            );
        };

        const Search = ({ searchTerm, onSearchChange }) => {
            return (
                <div className="relative max-w-md mx-auto mb-12">
                    <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <Icon name="Search" className="text-gray-400" size={20} />
                    </div>
                    <input
                        type="text"
                        value={searchTerm}
                        onChange={(e) => onSearchChange(e.target.value)}
                        placeholder="Search for health, roads, schools..."
                        className="w-full pl-12 pr-4 py-3 rounded-full bg-white border border-gray-200 focus:border-[var(--color-accent-blue)] focus:ring-2 focus:ring-[var(--color-accent-blue)]/20 outline-none transition-all shadow-sm"
                    />
                </div>
            );
        };

        const BudgetStream = ({ taxAmount, year }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const yearMultiplier = 1 + ((year - 2025) * 0.05);

            const filteredData = budgetData.map(cat => {
                const numericAmount = parseInt(cat.amount.replace(/[^0-9]/g, ''));
                const adjustedAmount = Math.round(numericAmount * yearMultiplier);
                return { ...cat, amount: `€${adjustedAmount}B` };
            }).filter(category =>
                category.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                category.description.toLowerCase().includes(searchTerm.toLowerCase()) ||
                category.examples.some(ex => ex.toLowerCase().includes(searchTerm.toLowerCase()))
            );

            return (
                <section className="min-h-screen w-full py-20 px-4 bg-[var(--color-bg-soft)]">
                    <div className="container mx-auto">
                        <motion.div
                            className="text-center mb-12"
                            initial={{ opacity: 0, y: 20 }}
                            whileInView={{ opacity: 1, y: 0 }}
                            viewport={{ once: true }}
                        >
                            <h2 className="text-3xl md:text-4xl font-bold mb-4">
                                {taxAmount ? `Your ${year} contribution fuels society.` : `In ${year}, your contribution fuels society.`}
                            </h2>
                            <p className="text-[var(--color-text-muted)] text-lg max-w-2xl mx-auto mb-8">
                                {taxAmount ? "Here is exactly how your money is distributed." : "See how every euro is distributed across the nation's most vital sectors."}
                            </p>
                            <Search searchTerm={searchTerm} onSearchChange={setSearchTerm} />
                        </motion.div>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {filteredData.map((category, index) => (
                                <CategoryCard key={category.id} category={category} index={index} userTax={taxAmount} />
                            ))}
                        </div>

                        {filteredData.length === 0 && (
                            <div className="text-center text-gray-500 py-12">No categories found matching "{searchTerm}"</div>
                        )}
                    </div>
                </section>
            );
        };

        const NearMeMap = () => {
            const [isAdminView, setIsAdminView] = useState(false);
            return (
                <section className="w-full py-20 px-4 bg-gray-50">
                    <div className="container mx-auto">
                        <div className="flex flex-col md:flex-row items-center justify-between mb-8">
                            <div>
                                <div className="flex items-center gap-2 mb-2">
                                    <h2 className="text-3xl font-bold flex items-center gap-2">
                                        <Icon name="Map" className="text-[var(--color-accent-blue)]" /> Spending Near You
                                    </h2>
                                    <span className="px-2 py-1 rounded-full bg-red-100 text-red-600 text-xs font-bold flex items-center gap-1 animate-pulse">
                                        <Icon name="Radio" size={12} /> LIVE
                                    </span>
                                </div>
                                <p className="text-gray-600">Real-time project tracking. Currently viewing: <span className="font-bold text-black">Berlin, Germany</span>.</p>
                            </div>
                            <div className="flex items-center gap-3 bg-white p-2 rounded-full shadow-sm border border-gray-200 mt-4 md:mt-0">
                                <span className={`text-sm font-medium ${!isAdminView ? 'text-black' : 'text-gray-400'}`}>Citizen View</span>
                                <button onClick={() => setIsAdminView(!isAdminView)} className={`w-12 h-6 rounded-full p-1 transition-colors duration-300 ${isAdminView ? 'bg-[var(--color-accent-purple)]' : 'bg-gray-200'}`}>
                                    <motion.div className="w-4 h-4 bg-white rounded-full shadow-md" animate={{ x: isAdminView ? 24 : 0 }} />
                                </button>
                                <span className={`text-sm font-medium ${isAdminView ? 'text-[var(--color-accent-purple)]' : 'text-gray-400'}`}>City Admin</span>
                            </div>
